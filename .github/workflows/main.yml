name: Keep Supabase Awake

on:
  schedule:
    # Runs every 2 days at 03:00 UTC
    - cron: '0 3 */2 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/supabase_response.txt -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Supabase ping HTTP status: $STATUS"

          # Any non-5xx response means Supabase was reached.
          if [ "$STATUS" -ge 500 ]; then
            echo "Supabase returned server error (5xx)."
            cat /tmp/supabase_response.txt
            exit 1
          fi

          echo "Supabase ping successful."
